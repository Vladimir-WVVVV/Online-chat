server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: onlinechat-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/onlinechat?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:onlinechat}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_app}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

onlinechat:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-characters}
    expire-minutes: ${JWT_EXPIRE_MINUTES:1440}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.whu.onlinechat: info
